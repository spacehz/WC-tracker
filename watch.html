<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مشاهدة المباراة | فين الماتش</title>
  <meta name="description" content="شاهد المباراة عبر المشغّل الرسمي على فين الماتش." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="stylesheet" href="/styles.css?v=5" />

  <!-- Adcash Auto-Tag (same monetization as the rest of the site) -->
  <script src="https://acscdn.com/script/aclib.js"></script>
  <script type="text/javascript">
    aclib.runAutoTag({ zoneId: 'jdppgdwmh3' });
  </script>

  <style>
    .player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); margin: 16px 0; }
    .player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .watch-title { font-size: clamp(1.2rem, 3vw, 1.8rem); margin: 18px 0 4px; }
    .watch-sub { color: var(--text-dim); margin: 0 0 6px; }
    .watch-fallback { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .watch-fallback .btn { display: inline-block; margin-top: 14px; padding: 12px 22px; border-radius: 12px; background: var(--accent); color: #042b20; font-weight: 800; text-decoration: none; }
    .disclaimer { font-size: .82rem; color: var(--text-dim); background: var(--bg-elev2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin: 16px 0; }
    .back-link { display: inline-block; margin: 10px 0; color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <span class="brand-ball">⚽</span>
        <span class="brand-lockup">
          <span class="brand-text">فين <span class="accent">الماتش</span></span>
          <span class="brand-sub">Feen El Match</span>
        </span>
      </a>
    </div>
  </header>

  <main class="container">
    <a class="back-link" href="/">→ العودة إلى جدول المباريات</a>
    <h1 class="watch-title" id="matchTitle">مشاهدة المباراة</h1>
    <p class="watch-sub" id="matchSub"></p>

    <div id="playerArea"></div>

    <div class="disclaimer" id="disclaimer">
      تُعرض المباريات عبر المشغّلات الرسمية فقط. فين الماتش لا يستضيف أي بث ولا يرتبط بالفيفا.
    </div>
  </main>

  <script>
    (function () {
      'use strict';
      // Only LEGAL embed platforms are allowed to load in the iframe.
      // Official highlights / licensed channels live here. Anything else is refused.
      const ALLOWED_HOSTS = [
        'youtube.com', 'www.youtube.com', 'youtube-nocookie.com', 'www.youtube-nocookie.com',
        'dailymotion.com', 'www.dailymotion.com', 'geo.dailymotion.com',
        'twitch.tv', 'player.twitch.tv',
      ];

      const qs = new URLSearchParams(location.search);
      const id = qs.get('id');
      const home = qs.get('h') || '';
      const away = qs.get('a') || '';
      const dateStr = qs.get('t') || '';
      const group = qs.get('g') || '';

      const title = home && away ? `${home} ضد ${away}` : 'مشاهدة المباراة';
      document.getElementById('matchTitle').textContent = title;
      document.title = `${title} | فين الماتش`;
      let sub = group;
      if (dateStr) {
        const d = new Date(dateStr);
        if (!isNaN(d)) {
          const opts = { weekday: 'long', day: 'numeric', month: 'long' };
          sub = `${new Intl.DateTimeFormat('ar', opts).format(d)} · ${new Intl.DateTimeFormat('ar', { hour: '2-digit', minute: '2-digit' }).format(d)}${group ? ' · ' + group : ''}`;
        }
      }
      document.getElementById('matchSub').textContent = sub;

      function isAllowed(url) {
        try {
          const h = new URL(url).hostname.toLowerCase();
          return ALLOWED_HOSTS.some((a) => h === a || h.endsWith('.' + a));
        } catch (e) { return false; }
      }

      function noVideo(msg) {
        document.getElementById('playerArea').innerHTML =
          '<div class="player-wrap"><div class="watch-fallback">' +
          '<p>' + (msg || 'لا يتوفر بث لهذه المباراة بعد.') + '</p>' +
          '<a class="btn" href="/">→ العودة إلى الجدول</a>' +
          '</div></div>';
      }

      async function init() {
        if (!id) { noVideo(); return; }
        try {
          // Per-match video comes straight from the static file (no API).
          const res = await fetch('/data/match-embeds.json', { cache: 'no-store' });
          const data = await res.json();
          const embed = (data.embeds || {})[String(id)];
          if (embed && isAllowed(embed)) {
            document.getElementById('playerArea').innerHTML =
              '<div class="player-wrap"><iframe src="' + embed +
              '" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="no-referrer"></iframe></div>';
          } else {
            noVideo();
          }
        } catch (e) {
          noVideo();
        }
      }
      init();
    })();
  </script>
</body>
</html>
